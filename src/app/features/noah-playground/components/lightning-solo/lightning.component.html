<div class="pl-6">
  <div class="flex items-center">
    <div class="inline-flex items-center radio">
      <input
        type="radio"
        class="radio h-5 w-5 text-blue-600"
        id="selected-lightning-{{ lightningType }}"
        [checked]="(selectedLightning$ | async) === lightningType"
        (click)="selectLightning(lightningType)"
      />
    </div>
    <div class="flex flex-col ml-3">
      <label
        for="selected-lightning-{{ lightningType }}"
        class="text-lg f-f-r capitalize"
        >{{ displayName }}</label
      >
    </div>
  </div>
  <div class="flex items-center pt-4"></div>
</div>
