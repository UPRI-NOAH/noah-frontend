<div class="flex flex-col p-5 w-full">
  <div>
    <div class="flex flex-wrap gap-2 mb-4">
      <button
        *ngFor="let day of forecastDays"
        type="button"
        class="px-2 py-1 rounded-md border text-sm focus:outline-none"
        [ngClass]="
          (selectedForecastDay$ | async) === day.value
            ? 'bg-primary text-white border-primary'
            : 'bg-white text-gray-800 border-gray-400'
        "
        (click)="selectForecastDay(day.value)"
      >
        {{ day.label }}
      </button>
    </div>
    <div class="flex justify-around">
      <div class="my-auto items-center">
        <!-- CONTOUR MAP SOLO START -->
        <div class="items-center">
          <noah-wu-temperature-solo
            *ngFor="let temperatures of temperature"
            [tempName]="temperatures"
          >
          </noah-wu-temperature-solo>
        </div>
      </div>
    </div>
  </div>
</div>
