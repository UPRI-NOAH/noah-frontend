<div
  class="absolute top-0 left-0 w-full h-full"
  id="map-weather-updates"
  data-tour-id="map-canvas"
></div>
<pre id="coordinates" class="coords"></pre>

<div class="md:hidden flex items-center absolute w-full space-x-2 p-2 top-0">
  <!-- Back Button -->
  <button
    routerLink="/"
    class="
      w-10
      h-10
      rounded-full
      bg-white
      flex
      items-center
      justify-center
      shadow
    "
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      class="h-5 w-5"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M10 19l-7-7m0 0l7-7m-7 7h18"
      />
    </svg>
  </button>

  <!-- Search Input Container -->
  <div
    class="flex items-center bg-white rounded-full shadow flex-1 max-w-3xl"
    data-tour-id="location-search"
  >
    <noah-search
      [searchTerm]="currentLocation$ | async"
      (selectPlace)="selectPlace($event)"
      class="flex-1"
    >
    </noah-search>
  </div>
</div>

<div class="map-tools absolute z-[60] right-0 mr-1 flex flex-col items-center">
  <!-- Switch Map Style -->
  <noah-change-style-button
    class="p-1.5"
    data-tour-id="map-view"
    [selectedStyle]="mapStyle"
    (selectedStyleChange)="switchMapStyle($event)"
  >
  </noah-change-style-button>

  <div class="mt-1 px-1.5">
    <noah-tour
      [definition]="tourDefinition"
      [autoOpenOnFirstVisit]="true"
      data-tour-id="tour-help-info"
    ></noah-tour>
  </div>
</div>
